# ============================================================
# KMRL NexusAI — GitHub Actions CI/CD Pipeline
# ============================================================
# Triggers: push to main/develop, PRs, nightly schedule
# Stages: lint → test → build → security scan → deploy

name: KMRL NexusAI CI/CD

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"   # nightly security scan at 02:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kmrl
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ─────────────────────────────────────────────────────────
  lint-backend:
    name: "Lint · Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy black isort

      - name: Ruff lint
        run: ruff check backend/app/ --output-format=github

      - name: Black format check
        run: black --check backend/app/

      - name: isort check
        run: isort --check-only backend/app/

      - name: mypy type check
        run: mypy backend/app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # advisory only

  lint-frontend:
    name: "Lint · Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npm run type-check

  # ── Tests ────────────────────────────────────────────────────────
  test-backend:
    name: "Test · Backend (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint-backend
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: kmrl_test
          POSTGRES_USER: kmrl
          POSTGRES_PASSWORD: kmrl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run schema migrations
        env:
          DATABASE_URL: postgresql://kmrl:kmrl_test@localhost:5432/kmrl_test
        working-directory: backend
        run: |
          psql $DATABASE_URL -f app/db/schema.sql || true

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://kmrl:kmrl_test@localhost:5432/kmrl_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-minimum-32-chars-here
          ENVIRONMENT: test
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -x \
            --tb=short \
            --junit-xml=test-results.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: backend/test-results.xml

  test-optimizer:
    name: "Test · Optimizer Engine"
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install optimizer deps
        working-directory: backend
        run: |
          pip install ortools numpy pandas scikit-learn xgboost shap pytest pytest-asyncio

      - name: Run optimizer tests
        working-directory: backend
        run: |
          pytest tests/test_suite.py::TestConstraintChecker tests/test_suite.py::TestInductionOptimizer tests/test_suite.py::TestOptimizerPerformance -v --tb=short

  test-frontend:
    name: "Test · Frontend"
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Unit tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Build check
        working-directory: frontend
        run: npm run build

  # ── Security Scan ─────────────────────────────────────────────────
  security-scan:
    name: "Security · SAST + Dependency Audit"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Python safety check
        working-directory: backend
        run: |
          pip install safety
          safety check -r requirements.txt --full-report
        continue-on-error: true

      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r backend/app/ -f json -o bandit-results.json -ll
        continue-on-error: true

  # ── Build Docker Images ──────────────────────────────────────────
  build-images:
    name: "Build · Docker Images"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-optimizer]
    if: github.event_name != 'pull_request'
    outputs:
      api-image: ${{ steps.meta-api.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      sha-tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Docker meta (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/nexusai-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.api
          target: production
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Docker meta (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/nexusai-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./infra/docker/Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/nexusai-api:sha-${{ steps.sha.outputs.tag }}
          format: table
          exit-code: 0
          severity: CRITICAL

  # ── Deploy to Staging ─────────────────────────────────────────────
  deploy-staging:
    name: "Deploy · Staging"
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.nexusai.kmrl.in
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig (staging)
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install kmrl-staging ./infra/helm/kmrl \
            --namespace kmrl-staging \
            --create-namespace \
            --set image.api.tag=sha-${{ needs.build-images.outputs.sha-tag }} \
            --set image.frontend.tag=sha-${{ needs.build-images.outputs.sha-tag }} \
            --set environment=staging \
            --set ingress.host=staging.nexusai.kmrl.in \
            --values ./infra/helm/kmrl/values-staging.yaml \
            --wait \
            --timeout 10m

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.nexusai.kmrl.in/health || exit 1
          curl -f https://api.staging.nexusai.kmrl.in/health || exit 1
          echo "Smoke tests passed"

      - name: Notify on Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deploy ${{ job.status }} — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ── Deploy to Production ──────────────────────────────────────────
  deploy-production:
    name: "Deploy · Production"
    runs-on: ubuntu-latest
    needs: [build-images, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://nexusai.kmrl.in
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig (production)
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Pre-deploy DB migrations
        run: |
          kubectl run db-migrate \
            --image=${{ env.IMAGE_PREFIX }}/nexusai-api:sha-${{ needs.build-images.outputs.sha-tag }} \
            --restart=Never \
            --namespace=kmrl-production \
            --env="DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" \
            --command -- alembic upgrade head
          kubectl wait pod/db-migrate --for=condition=Completed --timeout=120s -n kmrl-production
          kubectl delete pod/db-migrate -n kmrl-production

      - name: Blue/Green deploy via Helm
        run: |
          helm upgrade --install kmrl-prod ./infra/helm/kmrl \
            --namespace kmrl-production \
            --set image.api.tag=sha-${{ needs.build-images.outputs.sha-tag }} \
            --set image.frontend.tag=sha-${{ needs.build-images.outputs.sha-tag }} \
            --set environment=production \
            --set replicaCount.api=3 \
            --set replicaCount.frontend=2 \
            --set ingress.host=nexusai.kmrl.in \
            --values ./infra/helm/kmrl/values-production.yaml \
            --atomic \
            --timeout 15m

      - name: Production smoke tests
        run: |
          sleep 45
          curl -sf https://nexusai.kmrl.in/ -o /dev/null && echo "Frontend: OK"
          curl -sf https://api.nexusai.kmrl.in/health | grep '"status":"healthy"' && echo "API: OK"
          curl -sf https://api.nexusai.kmrl.in/api/v1/kpis -H "Authorization: Bearer ${{ secrets.SMOKE_TEST_TOKEN }}" | grep 'fleet_availability' && echo "KPIs: OK"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify production deploy
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d '{"text":"🚇 KMRL NexusAI *production deploy* ${{ job.status }} — `sha-${{ needs.build-images.outputs.sha-tag }}`"}' || true
