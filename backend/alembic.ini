# ============================================================
# KMRL NexusAI — Alembic Configuration
# ============================================================

[alembic]
# Path to migration scripts
script_location = app/db

# Template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# Default migration file timezone
# timezone =

# Max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version location specification; This defaults
# to app/db/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# version_locations = %(here)s/bar:%(here)s/bat:app/db/versions

# The output encoding used when revision files are written from script.mako
# output_encoding = utf-8

# Database URL — override from environment variable DATABASE_URL
# asyncpg URL is converted to psycopg2 for synchronous migration scripts
sqlalchemy.url = postgresql://kmrl:kmrl_secret@localhost:5432/kmrl_nexusai


[post_write_hooks]
# Automatically format migrations with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
