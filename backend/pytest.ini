[pytest]
# ============================================================
# KMRL NexusAI — pytest Configuration
# ============================================================

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    slow: marks tests as slow (>5s) — deselect with -m "not slow"
    integration: full pipeline integration tests — require all services
    ml: machine learning model tests
    optimizer: OR-Tools optimizer tests
    api: FastAPI endpoint tests
    security: authentication and authorization tests
    chaos: resilience and fault-injection tests — require running stack

# Default options
addopts =
    --strict-markers
    --tb=short
    --color=yes
    -q
    --durations=10

# Coverage (when run with --cov)
# --cov=app --cov-report=term-missing --cov-fail-under=75

# Timeout (seconds per test)
timeout = 60
timeout_method = thread

# Log settings
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Filter warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning
    ignore:.*asyncio.*:DeprecationWarning
    ignore:.*SQLAlchemy.*:DeprecationWarning

# xdist (parallel) config — install pytest-xdist to use
# addopts = -n auto  # auto-detect CPU count

# Environment variables for all tests
env =
    ENVIRONMENT=test
    LOG_LEVEL=WARNING
    DEBUG=false
