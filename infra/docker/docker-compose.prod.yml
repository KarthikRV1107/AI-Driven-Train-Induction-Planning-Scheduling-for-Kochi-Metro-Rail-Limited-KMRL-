version: "3.9"
# ============================================================
# KMRL NexusAI — Production Docker Compose Overlay
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── API (production hardening) ───────────────────────────────────────────
  api:
    image: ${REGISTRY:-ghcr.io/kmrl}/nexusai-api:${APP_VERSION:-2.4.1}
    build:
      target: production
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
      DATABASE_POOL_SIZE: "20"
      OPTIMIZER_TIMEOUT_SECONDS: "30"
    secrets:
      - secret_key
      - database_url
      - smtp_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=kmrl-api,env=production"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ── Frontend (production) ────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io/kmrl}/nexusai-frontend:${APP_VERSION:-2.4.1}
    build:
      target: production
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      NEXT_PUBLIC_API_URL: https://api.nexusai.kmrl.in
      NEXT_PUBLIC_WS_URL: wss://api.nexusai.kmrl.in
      NODE_ENV: production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Optimization Worker (production) ────────────────────────────────────
  worker-optimization:
    image: ${REGISTRY:-ghcr.io/kmrl}/nexusai-api:${APP_VERSION:-2.4.1}
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      -Q optimization
      -c 2
      --loglevel=warning
      --max-tasks-per-child=50
      --without-gossip
      --without-mingle
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── ML Worker (production) ───────────────────────────────────────────────
  worker-ml:
    image: ${REGISTRY:-ghcr.io/kmrl}/nexusai-api:${APP_VERSION:-2.4.1}
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      -Q ml
      -c 1
      --loglevel=warning
      --max-tasks-per-child=5
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "8.0"
          memory: 12G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── PostgreSQL (production hardening) ────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256"
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - max_connections=100
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=5242kB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
      - -c
      - log_min_duration_statement=1000   # log slow queries >1s
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_checkpoints=on
      - -c
      - ssl=on
    secrets:
      - postgres_password
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  # ── Redis (production hardening) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-CHANGE_ME}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
      --loglevel warning
      --protected-mode yes
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── NGINX (production TLS) ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # Let's Encrypt certs
      - nginx-cache:/var/cache/nginx
    security_opt:
      - no-new-privileges:true

# ── Docker Secrets ────────────────────────────────────────────────────────
secrets:
  secret_key:
    external: true
    name: kmrl_secret_key
  database_url:
    external: true
    name: kmrl_database_url
  smtp_password:
    external: true
    name: kmrl_smtp_password
  postgres_password:
    external: true
    name: kmrl_postgres_password

volumes:
  nginx-cache:
